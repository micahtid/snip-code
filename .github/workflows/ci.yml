# ci: typecheck + build on every pr (section 19.9). intentionally minimal —
# no test-bench run here (the grader needs headless chrome + a local bundle
# corpus that does not live in ci). strict tsc is the gate that matters for
# inter-module contracts.
name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
